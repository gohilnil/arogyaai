services:
  - type: web
    name: arogyaai
    runtime: python
    region: singapore          # Closest region to India
    plan: free                 # Upgrade to 'starter' ($7/mo) when you need always-on
    rootDir: backend           # Render will cd into backend/ automatically!
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"

      # ── AI (MUST SET in Render Dashboard) ──────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: "2000"
      - key: TEMPERATURE
        value: "0.45"

      # ── Security (auto-generated by Render) ────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true

      # ── Database (MUST SET in Render Dashboard) ────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # ── Payment (optional) ─────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false

      # ── App Config ─────────────────────────────────────────
      - key: FREE_DAILY_QUERIES
        value: "5"
      - key: RATE_LIMIT_REQUESTS
        value: "60"
      - key: RATE_LIMIT_WINDOW
        value: "60"
      - key: CACHE_TTL_SECONDS
        value: "3600"

      # ── CORS: set after you know your Render URL ───────────
      # Example: https://arogyaai.onrender.com
      - key: CORS_ORIGINS
        sync: false
