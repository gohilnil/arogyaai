name: ArogyaAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Test Suite ──────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit & integration tests
        run: pytest tests/ -v --tb=short --no-header
        env:
          APP_ENV: test
          GROQ_API_KEY: test-fake-key-for-ci
          JWT_SECRET: test-jwt-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          CORS_ORIGINS: http://localhost:8000
          FREE_DAILY_QUERIES: 50

  # ── Linting ─────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linter
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check . --output-format=github

  # ── Docker Build ─────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t arogyaai:${{ github.sha }} .

      - name: Test Docker health check
        run: |
          docker run -d \
            -e APP_ENV=test \
            -e GROQ_API_KEY=test-key \
            -e JWT_SECRET=test-jwt-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx \
            -p 8001:8000 \
            --name arogyaai-test \
            arogyaai:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8001/health
          docker stop arogyaai-test
